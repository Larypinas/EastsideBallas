<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Braço Direito | Ballas</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;

        /* IMAGEM DE FUNDO */
        background: 
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url("https://r2.fivemanage.com/image/NESF8AHZ1iCb.png");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    .container {
        background: rgba(20, 20, 20, 0.90);
        border: 2px solid #7b00ff;
        border-radius: 20px;
        padding: 50px;
        width: 600px;
        text-align: center;
        box-shadow: 0 0 40px rgba(123, 0, 255, 0.6);
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(6px);
    }

    .container::before {
        content: "";
        position: absolute;
        width: 300%;
        height: 300%;
        top: -100%;
        left: -100%;
        background: radial-gradient(circle, rgba(123,0,255,0.2) 0%, transparent 70%);
        animation: glow 6s linear infinite;
    }

    @keyframes glow {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    h1 {
        font-size: 48px;
        color: #b266ff;
        text-shadow: 0 0 15px #7b00ff;
        margin-bottom: 10px;
        letter-spacing: 3px;
    }

    .subtitle {
        font-size: 14px;
        color: #999;
        margin-bottom: 40px;
        letter-spacing: 2px;
    }

    .description {
        font-size: 18px;
        line-height: 1.6;
        color: #ddd;
    }

    .highlight {
        color: #b266ff;
        font-weight: bold;
    }

    .footer {
        margin-top: 40px;
        font-size: 12px;
        color: #555;
        letter-spacing: 2px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>BRAÇO DIREITO</h1>
    <div class="subtitle">EAST SIDE BALLAS</div>

    <div class="description">
        São os membros de <span class="highlight">maior confiança</span> da gangue.
        Estes são os únicos, além dos patrões, que têm acesso ao 
        <span class="highlight">baú da gerência</span>, sendo assim,
        também responsáveis pela <span class="highlight">administração da gangue</span> 
        e seus equipamentos.
    </div>

    <div class="footer">
        
    </div>
</div>

</body>
</html>
