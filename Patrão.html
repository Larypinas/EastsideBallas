<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrão - East Side Ballas</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        text-align: center;

        background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url("https://r2.fivemanage.com/image/K5LabkabPeMM.png");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    h1 {
        font-size: 60px;
        letter-spacing: 6px;
        color: #b266ff;
        text-shadow: 0 0 25px #7b00ff;
    }

    p {
        font-size: 19px;
        margin-top: 20px;
        max-width: 700px;
        line-height: 1.7;
    }

    .highlight {
        color: #b266ff;
        font-weight: bold;
        text-shadow: 0 0 10px #7b00ff;
    }

    .overlay {
        background: rgba(0,0,0,0.5);
        padding: 60px 80px;
        border-radius: 20px;
        border: 2px solid #7b00ff;
        box-shadow: 0 0 50px rgba(123, 0, 255, 0.6);
        backdrop-filter: blur(6px);
    }

    a {
        display: inline-block;
        margin-top: 30px;
        text-decoration: none;
        color: #b266ff;
        font-weight: bold;
        letter-spacing: 2px;
    }

    a:hover {
        color: white;
    }
button {
    margin-top: 30px;
    background: transparent;
    border: 2px solid #b266ff;
    color: #b266ff;
    padding: 12px 30px;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
    text-shadow: 0 0 10px #7b00ff;
}

button:hover {
    background: rgba(178,102,255,0.1);
    box-shadow: 0 0 20px #7b00ff;
}
</style>
</head>

<body>

<div class="overlay">
    <h1>Patrão</h1>

    <p>
       Maior posição dentro da gangue.  
       É responsável pelo <span class="highlight">controle</span> e <span class="highlight">tomada de decisões</span>  
       em assuntos que envolvem o gueto.
    </p>

<button id="musicBtn">ATIVAR SOM</button>

<audio id="bgMusic" loop>
   <source src="https://r2.fivemanage.com/8naZrBl7lYmbcqGUtr377/Gatilho.mp3">
</audio>
<script>
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

music.volume = 0.5;

btn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        btn.textContent = "PAUSAR SOM";
    } else {
        music.pause();
        btn.textContent = "ATIVAR SOM";
    }
});
</script>

</body>
</html>
