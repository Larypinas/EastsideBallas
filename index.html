<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>East Side Ballas</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        text-align: center;

        background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url("https://r2.fivemanage.com/image/QzzO0yeD3d2k.png");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    h1 {
        font-size: 70px;
        letter-spacing: 8px;
        color: #b266ff;
        text-shadow: 0 0 25px #7b00ff;
        animation: glow 2.5s infinite alternate;
        margin-bottom: 40px;
    }

    @keyframes glow {
        from { text-shadow: 0 0 15px #7b00ff; }
        to { text-shadow: 0 0 35px #b266ff; }
    }

    #musicBtn {
        background: none;
        border: none;
        font-size: 22px;
        letter-spacing: 3px;
        color: #b266ff;
        cursor: pointer;
        text-shadow: 0 0 15px #7b00ff;
        transition: 0.3s;
    }

    #musicBtn:hover {
        text-shadow: 0 0 30px #b266ff;
    }
</style>
</head>

<body>

<h1>EAST SIDE BALLAS</h1>
<button id="musicBtn">ATIVAR SOM</button>

<audio id="bgMusic" loop>
   <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

music.volume = 0.5;

btn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        btn.textContent = "PAUSAR SOM";
    } else {
        music.pause();
        btn.textContent = "ATIVAR SOM";
    }
});
</script>

</body>
</html>
