<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>East Side Ballas</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        text-align: center;

        background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url("https://r2.fivemanage.com/image/QzzO0yeD3d2k.png");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    h1 {
        font-size: 70px;
        letter-spacing: 8px;
        color: #b266ff;
        text-shadow: 0 0 25px #7b00ff;
        animation: glow 2.5s infinite alternate;
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 15px #7b00ff;
        }
        to {
            text-shadow: 0 0 35px #b266ff;
        }
    }

    .overlay {
        background: rgba(0,0,0,0.4);
        padding: 60px 80px;
        border-radius: 20px;
        border: 2px solid #7b00ff;
        box-shadow: 0 0 50px rgba(123, 0, 255, 0.6);
        backdrop-filter: blur(5px);
    }

</style>
</head>

<body>

<div class="overlay">
    <h1>EAST SIDE BALLAS</h1>
</div>

<audio id="bgMusic" loop>
    <source src="https://s31.aconvert.com/convert/p3r68-cdx67/nm7ky-614hd.mp3" type="audio/mpeg">
</audio>

<script>
    const music = document.getElementById("bgMusic");
    music.volume = 0.5;

    document.addEventListener("click", function () {
        music.play();
    }, { once: true });
</script>

<audio id="bgMusic" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
    const music = document.getElementById("bgMusic");
    music.volume = 0.5;

    document.addEventListener("click", function () {
        music.play();
    }, { once: true });
</script>
    
</body>
</html>
