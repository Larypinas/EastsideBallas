<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membro | East Side Ballas</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        text-align: center;

        background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url("https://r2.fivemanage.com/image/RXE7sKJtaxN1.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    .container {
        background: rgba(20, 20, 20, 0.90);
        border: 2px solid #7b00ff;
        border-radius: 20px;
        padding: 50px;
        width: 650px;
        text-align: center;
        box-shadow: 0 0 40px rgba(123, 0, 255, 0.6);
        backdrop-filter: blur(6px);
    }

    h1 {
        font-size: 48px;
        color: #b266ff;
        text-shadow: 0 0 15px #7b00ff;
        letter-spacing: 4px;
        margin-bottom: 20px;
    }

    .description {
        font-size: 18px;
        line-height: 1.7;
        color: #ddd;
    }

    .highlight {
        color: #b266ff;
        font-weight: bold;
    }

    .back {
        display: inline-block;
        margin-top: 35px;
        padding: 12px 30px;
        border: 2px solid #b266ff;
        border-radius: 25px;
        color: #b266ff;
        text-decoration: none;
        transition: 0.3s;
        letter-spacing: 2px;
    }

    .back:hover {
        background: #b266ff;
        color: black;
        box-shadow: 0 0 20px #7b00ff;
    }
</style>
</head>

<body>

<div class="container">
    <h1>MEMBRO</h1>

    <div class="description">
        Não possuem tanta responsabilidade quanto os superiores,
        mas ainda são <span class="highlight">fortes representantes da comunidade</span>.
        Portanto, devem agir com <span class="highlight">cautela</span> em questões
        que envolvem a organização.
    </div>

</body>
</html>
